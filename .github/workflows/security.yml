name: Security Checks

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: '0 5 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  dependency_review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  codeql:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  secret_scan:
    runs-on: ubuntu-latest
    env:
      TRUFFLEHOG_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
      TRUFFLEHOG_HEAD: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan secrets (git diff range)
        if: env.TRUFFLEHOG_BASE != '' && env.TRUFFLEHOG_BASE != env.TRUFFLEHOG_HEAD && env.TRUFFLEHOG_BASE != '0000000000000000000000000000000000000000'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ env.TRUFFLEHOG_BASE }}
          head: ${{ env.TRUFFLEHOG_HEAD }}

      - name: Scan secrets (full repository fallback)
        if: env.TRUFFLEHOG_BASE == '' || env.TRUFFLEHOG_BASE == env.TRUFFLEHOG_HEAD || env.TRUFFLEHOG_BASE == '0000000000000000000000000000000000000000'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
