name: Deploy Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate required paths
        shell: bash
        run: |
          set -euo pipefail
          required=(
            "web"
            "data"
            "specification.md"
            "documentation"
          )
          for p in "${required[@]}"; do
            if [ ! -e "$p" ]; then
              echo "Missing required path: $p"
              exit 1
            fi
          done

      - name: Validate JSON payload syntax
        shell: bash
        run: |
          set -euo pipefail
          for f in data/API/json/*.json; do
            node -e "JSON.parse(require('node:fs').readFileSync(process.argv[1], 'utf8'))" "$f"
          done

      - name: Validate JSON payloads against schemas
        run: |
          npx --yes ajv-cli validate -s data/API/json-schema/festival.schema.json -d data/API/json/festival.json --spec=draft2020 --validate-formats=false
          npx --yes ajv-cli validate -s data/API/json-schema/venues.schema.json -d data/API/json/venues.json --spec=draft2020 --validate-formats=false
          npx --yes ajv-cli validate -s data/API/json-schema/performers.schema.json -d data/API/json/performers.json --spec=draft2020 --validate-formats=false
          npx --yes ajv-cli validate -s data/API/json-schema/events.schema.json -d data/API/json/events.json --spec=draft2020 --validate-formats=false

      - name: Validate core HTML exists
        shell: bash
        run: |
          set -euo pipefail
          required_pages=(
            "web/index.html"
            "web/programme.html"
            "web/performers.html"
            "web/info.html"
          )
          for p in "${required_pages[@]}"; do
            if [ ! -f "$p" ]; then
              echo "Missing required page: $p"
              exit 1
            fi
          done

  build_artifact:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Assemble dist
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp -r web/. dist/
          cp -r data dist/data
          cp specification.md dist/specification.md
          cp -r documentation dist/documentation
          touch dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build_artifact
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
