openapi: 3.1.0
info:
  title: Desert Pulse Festival API
  version: 1.0.0
  description: Static JSON data endpoints generated from the Desert Pulse Festival XML dataset.
servers:
  - url: https://hostilian.github.io/Desert_Pulse_Festival_complete
paths:
  /data/API/json/festival.json:
    get:
      summary: Get festival identity and general information
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: './API/json-schema/festival.schema.json'}}}}
        '400': {description: Bad request, content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}
        '404': {description: Not found, content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}
  /data/API/json/venues.json:
    get:
      summary: Get all venues
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: './API/json-schema/venues.schema.json'}}}}
        '400': {description: Bad request, content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}
        '404': {description: Not found, content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}
  /data/API/json/venue-{id}.json:
    get:
      summary: Get one venue by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, pattern: '^v[0-9]+$'}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: './API/json-schema/venue-detail.schema.json'}}}}
        '400': {description: Bad request, content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}
        '404': {description: Not found, content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}
  /data/API/json/performers.json:
    get:
      summary: Get paginated performers list
      description: Returns one static page payload. Client code can follow `count` and `pageSize` to request additional pages.
      parameters:
        - name: page
          in: query
          required: false
          schema: {type: integer, minimum: 1, default: 1}
        - name: pageSize
          in: query
          required: false
          schema: {type: integer, minimum: 1, maximum: 60, default: 20}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: './API/json-schema/performers.schema.json'}}}}
        '400': {description: Bad request, content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}
        '404': {description: Not found, content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}
  /data/API/json/performer-{id}.json:
    get:
      summary: Get one performer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, pattern: '^p[0-9]+$'}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: './API/json-schema/performer-detail.schema.json'}}}}
        '400': {description: Bad request, content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}
        '404': {description: Not found, content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}
  /data/API/json/events.json:
    get:
      summary: Get paginated events list
      description: Returns one static page payload. Query parameters are accepted for compatibility and can be applied client-side.
      parameters:
        - name: day
          in: query
          required: false
          schema: {type: string, format: date}
          description: Day filter value expected by client-side UI, for example 2026-04-17.
        - name: venueId
          in: query
          required: false
          schema: {type: string, pattern: '^v[0-9]+$'}
          description: Venue filter value expected by client-side UI.
        - name: performerId
          in: query
          required: false
          schema: {type: string, pattern: '^p[0-9]+$'}
          description: Performer filter value expected by client-side UI.
        - name: page
          in: query
          required: false
          schema: {type: integer, minimum: 1, default: 1}
        - name: pageSize
          in: query
          required: false
          schema: {type: integer, minimum: 1, maximum: 60, default: 20}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: './API/json-schema/events.schema.json'}}}}
        '400': {description: Bad request, content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}
        '404': {description: Not found, content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}
  /data/API/json/event-{id}.json:
    get:
      summary: Get one event by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, pattern: '^e[0-9]+$'}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: './API/json-schema/event-detail.schema.json'}}}}
        '400': {description: Bad request, content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}
        '404': {description: Not found, content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}
components:
  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
          examples: [400, 404]
        message:
          type: string
