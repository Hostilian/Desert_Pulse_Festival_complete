openapi: 3.1.0
info:
  title: Desert Pulse Festival API
  version: 1.0.0
  description: Static REST-style API specification generated from the Desert Pulse Festival XML data.
servers:
  - url: https://example.com
paths:
  /api/festival:
    get:
      summary: Get festival identity and general information
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: './API/json-schema/festival.schema.json'}}}}
        '400': {description: Bad request}
        '404': {description: Festival not found}
  /api/venues:
    get:
      summary: Get all venues
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: './API/json-schema/venues.schema.json'}}}}
        '400': {description: Bad request}
        '404': {description: Venues not found}
  /api/venues/{id}:
    get:
      summary: Get one venue by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, pattern: '^v[0-9]+$'}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: './API/json-schema/venue-detail.schema.json'}}}}
        '400': {description: Invalid venue ID}
        '404': {description: Venue not found}
  /api/performers:
    get:
      summary: Get performers with pagination
      parameters:
        - name: page
          in: query
          required: false
          schema: {type: integer, minimum: 1, default: 1}
        - name: pageSize
          in: query
          required: false
          schema: {type: integer, minimum: 1, maximum: 60, default: 20}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: './API/json-schema/performers.schema.json'}}}}
        '400': {description: Invalid pagination parameter}
        '404': {description: Performers not found}
  /api/performers/{id}:
    get:
      summary: Get one performer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, pattern: '^p[0-9]+$'}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: './API/json-schema/performer-detail.schema.json'}}}}
        '400': {description: Invalid performer ID}
        '404': {description: Performer not found}
  /api/events:
    get:
      summary: Get programme events with filters and pagination
      parameters:
        - name: day
          in: query
          required: false
          schema: {type: string, format: date}
          description: Filter events by day, e.g. 2026-04-17.
        - name: venueId
          in: query
          required: false
          schema: {type: string, pattern: '^v[0-9]+$'}
          description: Filter events by venue ID.
        - name: performerId
          in: query
          required: false
          schema: {type: string, pattern: '^p[0-9]+$'}
          description: Filter events by performer ID.
        - name: page
          in: query
          required: false
          schema: {type: integer, minimum: 1, default: 1}
        - name: pageSize
          in: query
          required: false
          schema: {type: integer, minimum: 1, maximum: 60, default: 20}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: './API/json-schema/events.schema.json'}}}}
        '400': {description: Invalid filter or pagination parameter}
        '404': {description: Events not found}
  /api/events/{id}:
    get:
      summary: Get one event by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, pattern: '^e[0-9]+$'}
      responses:
        '200': {description: OK, content: {application/json: {schema: {$ref: './API/json-schema/event-detail.schema.json'}}}}
        '400': {description: Invalid event ID}
        '404': {description: Event not found}
